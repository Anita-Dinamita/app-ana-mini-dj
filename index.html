<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0A12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="Pide tu canción a Ana Mini DJ y explora su biblioteca.">
<title>Ana Mini DJ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0A12; --bg2:#0A0810; --panel:#171121; --panel2:#1E1730; --line:#2C2340;
  --ink:#F4EEFB; --muted:#9389A8; --dim:#6B6182;
  --magenta:#FF2E3F; --magenta-d:#C41427; --amber:#FFB23E; --cyan:#34E1D6; --green:#5AE08C;
  --disp:"Bricolage Grotesque",sans-serif; --body:"Inter",sans-serif; --mono:"Space Mono",monospace;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:
   radial-gradient(1100px 560px at 85% -10%, rgba(255,46,63,.12), transparent 60%),
   radial-gradient(820px 460px at -10% 8%, rgba(52,225,214,.08), transparent 55%),
   var(--bg);
  color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.5;min-height:100vh;
  -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
@media(min-width:720px){.wrap{padding:0 22px}}
a{color:inherit}

/* ---------- HEADER ---------- */
header{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
  background:linear-gradient(180deg, rgba(13,10,18,.94), rgba(13,10,18,.78));
  border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
.bar{display:flex;align-items:center;gap:12px;padding:12px 0}
.mark{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--ink)}
.disc{width:34px;height:34px;flex:none;animation:spin 6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.disc{animation:none}}
.word{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:-.02em;line-height:1}
.word b{color:var(--magenta)}
.word small{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted);font-weight:400;margin-top:3px}
.hstat{margin-left:auto;font-family:var(--mono);font-size:11px;text-align:right;color:var(--dim);line-height:1.3}
.hstat b{display:block;font-size:15px;color:var(--amber);font-family:var(--disp);font-weight:800}
.share{margin-left:6px;flex:none;width:38px;height:38px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);font-size:16px;cursor:pointer;display:none}
nav.tabs{display:flex;gap:6px}
nav.tabs button{flex:1;font-family:var(--disp);font-weight:700;font-size:15px;color:var(--muted);
  background:none;border:none;border-bottom:2.5px solid transparent;padding:11px 8px;cursor:pointer;
  white-space:nowrap;transition:color .15s}
nav.tabs button.on{color:var(--ink);border-color:var(--magenta)}
@media(min-width:720px){nav.tabs button{flex:none;padding:11px 18px}}

main{padding:20px 0 90px}
.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.sec{font-family:var(--disp);font-size:13px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);font-weight:700;margin:0 0 12px}

/* ---------- CARD / FORM ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px}
@media(min-width:720px){.card{padding:24px}}
.hero{background:
   linear-gradient(135deg, rgba(255,46,63,.12), rgba(52,225,214,.06)), var(--panel);
  border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:18px}
.hero h1{font-family:var(--disp);font-weight:800;font-size:26px;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px}
.hero p{color:var(--muted);font-size:14px;margin-bottom:18px}
.field{margin-bottom:14px}
.field>label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);font-weight:600;margin-bottom:7px}
.field .req{color:var(--magenta)}
.inp{width:100%;font-family:var(--body);font-size:16px;background:var(--bg2);border:1px solid var(--line);
  color:var(--ink);border-radius:12px;padding:13px 14px;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--magenta)}
.inp::placeholder{color:var(--dim)}
textarea.inp{resize:vertical;min-height:54px;font-size:15px}

/* combobox */
.combo{position:relative}
.drop{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:30;background:var(--panel2);
  border:1px solid var(--line);border-radius:12px;max-height:280px;overflow-y:auto;display:none;
  box-shadow:0 18px 50px rgba(0,0,0,.5)}
.drop.on{display:block}
.drop .it{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:1px}
.drop .it:last-child{border-bottom:none}
.drop .it:hover,.drop .it.hl{background:var(--magenta);color:#fff}
.drop .it .t{font-weight:600;font-size:14.5px}
.drop .it .a{font-size:12.5px;color:var(--muted)}
.drop .it:hover .a,.drop .it.hl .a{color:#fff;opacity:.85}
.drop .none{padding:14px;color:var(--dim);font-size:13.5px;text-align:center}
.chosen{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--cyan);
  border-radius:12px;padding:11px 14px;margin-top:2px}
.chosen .t{font-weight:700}.chosen .a{font-size:12.5px;color:var(--muted)}
.chosen .x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.send{width:100%;font-family:var(--disp);font-weight:800;font-size:17px;color:#fff;cursor:pointer;
  background:linear-gradient(135deg,var(--magenta),var(--magenta-d));border:none;border-radius:13px;
  padding:15px;margin-top:4px;transition:.15s;box-shadow:0 6px 22px rgba(255,46,63,.3)}
.send:hover{transform:translateY(-2px)}.send:active{transform:none}
.send:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.ok{display:none;text-align:center;color:var(--green);font-weight:700;padding:10px;font-size:15px}

/* ---------- REQUEST LIST ---------- */
.lhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:26px 0 12px}
.lhead .count{font-family:var(--mono);font-size:12px;color:var(--dim)}
.mini{font-family:var(--body);font-weight:600;font-size:12.5px;padding:8px 12px;border-radius:10px;cursor:pointer;
  background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
.toggle{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer}
.req{display:flex;align-items:flex-start;gap:12px;background:var(--panel);border:1px solid var(--line);
  border-radius:13px;padding:13px 15px;margin-bottom:8px;animation:row .35s both}
@keyframes row{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.req.done{opacity:.5}
.req .body{flex:1;min-width:0}
.req .song{font-weight:700;font-size:15px;line-height:1.25}
.req .who{font-size:12.5px;color:var(--cyan);margin-top:2px;font-family:var(--mono)}
.req .msg{font-size:13px;color:var(--muted);margin-top:4px;font-style:italic}
.req .when{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:4px}
.req .mark{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
  color:var(--green);font-size:16px;cursor:pointer}
.req.done .mark{background:var(--green);color:#0D0A12;border-color:var(--green)}

/* ---------- LIBRARY ---------- */
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.search{flex:1;min-width:160px;font-family:var(--body);font-size:16px;background:var(--panel);
  border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:12px 14px}
.search:focus{outline:none;border-color:var(--magenta)}
.search::placeholder{color:var(--dim)}
.filterseg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;overflow-x:auto}
.filterseg button{font-family:var(--body);font-size:13px;font-weight:600;padding:9px 13px;border:none;
  border-radius:9px;background:none;color:var(--muted);cursor:pointer;white-space:nowrap}
.filterseg button.on{background:var(--panel2);color:var(--ink)}
.sel{font-family:var(--body);font-size:13.5px;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:12px;padding:10px 12px;cursor:pointer}
.count{font-family:var(--mono);font-size:12px;color:var(--dim);margin-left:auto}
.row{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--panel);
  border-radius:12px;padding:11px 13px;margin-bottom:7px;transition:.12s}
.row:hover{border-color:var(--magenta)}
.row .info{flex:1;min-width:0}
.row .ti{font-weight:600;font-size:14.5px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .ar{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .pills{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:5px}
.pill{font-family:var(--mono);font-size:10.5px;padding:3px 7px;border-radius:6px;background:var(--bg2);
  border:1px solid var(--line);white-space:nowrap;color:var(--muted)}
.pill.key{color:var(--cyan);border-color:#34e1d633}
.pill.g{color:var(--amber);border-color:#ffb23e2a}
.askbtn{flex:none;width:40px;height:40px;border-radius:11px;border:1px solid var(--magenta);
  background:rgba(255,46,63,.12);color:var(--magenta);font-size:17px;cursor:pointer;transition:.12s}
.askbtn:hover{background:var(--magenta);color:#fff}
.empty{text-align:center;padding:54px 18px;color:var(--muted)}
.empty .big{font-family:var(--disp);font-size:20px;color:var(--ink);margin-bottom:6px}
footer{border-top:1px solid var(--line);padding:20px 0 30px;text-align:center;color:var(--dim);
  font-size:11.5px;font-family:var(--mono)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:200;
  background:var(--green);color:#08210f;font-weight:700;padding:13px 20px;border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transition:.25s;pointer-events:none;font-size:14.5px}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="bar">
      <a class="mark" href="#" id="home">
        <svg class="disc" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="19" fill="#1E1730" stroke="#FF2E3F" stroke-width="1.5"/>
          <circle cx="20" cy="20" r="13" fill="none" stroke="#34E1D6" stroke-width=".6" opacity=".5"/>
          <circle cx="20" cy="20" r="8" fill="none" stroke="#34E1D6" stroke-width=".6" opacity=".5"/>
          <circle cx="20" cy="20" r="5" fill="#FF2E3F"/>
          <circle cx="20" cy="20" r="1.6" fill="#0D0A12"/>
          <circle cx="20" cy="7" r="1.5" fill="#FFB23E"/>
        </svg>
        <span class="word">ANA <b>MINI</b> DJ<small>pide tu canción</small></span>
      </a>
      <div class="hstat"><b id="stTk">0</b>canciones</div>
      <button class="share" id="shareBtn" title="Compartir">🔗</button>
    </div>
    <nav class="tabs">
      <button class="on" data-v="peticiones">🎤 Peticiones <span id="reqBadge" style="display:none;background:var(--magenta);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:2px;font-weight:700"></span></button>
      <button data-v="lib">💿 Biblioteca</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <!-- PETICIONES -->
  <section class="view on" id="v-peticiones">
    <div class="hero">
      <h1>🎤 Pide tu canción</h1>
      <p>Elige un tema de la biblioteca de Ana y se lo mandas a cabina al momento.</p>
      <div class="field">
        <label>Tu canción <span class="req">*</span></label>
        <div class="combo">
          <input class="inp" id="songSearch" placeholder="Busca por título o artista…" autocomplete="off">
          <div class="drop" id="songDrop"></div>
        </div>
        <div class="chosen" id="songChosen" hidden><div><div class="t" id="chT"></div><div class="a" id="chA"></div></div><button class="x" id="chX" aria-label="Quitar">×</button></div>
      </div>
      <div class="field">
        <label>Tu nombre <span class="req">*</span></label>
        <input class="inp" id="reqName" maxlength="40" placeholder="¿Cómo te llamas?">
      </div>
      <div class="field">
        <label>Dedicatoria o mensaje <span style="color:var(--dim);text-transform:none;letter-spacing:0">(opcional)</span></label>
        <textarea class="inp" id="reqMsg" maxlength="140" placeholder="Para mi grupo, es mi cumple…"></textarea>
      </div>
      <button class="send" id="reqSend">Enviar petición ▸</button>
      <div class="ok" id="reqOk">✓ ¡Petición enviada! Ana ya la tiene 🎧</div>
    </div>

    <div class="lhead">
      <h2 class="sec" style="margin:0">Peticiones recibidas</h2>
      <span class="count" id="reqCount">0</span>
      <label class="toggle"><input type="checkbox" id="reqSound" checked> 🔔 aviso</label>
      <button class="mini" id="reqClear">Vaciar atendidas</button>
    </div>
    <div id="reqList"></div>
  </section>

  <!-- BIBLIOTECA -->
  <section class="view" id="v-lib">
    <div class="toolbar">
      <input class="search" id="lSearch" placeholder="Busca en la biblioteca…">
      <span class="count" id="lCount"></span>
    </div>
    <div class="toolbar">
      <div class="filterseg" id="lFilter">
        <button data-f="all" class="on">Todo</button>
        <button data-f="local">💾 En disco</button>
        <button data-f="missing">Sin archivo</button>
      </div>
      <select class="sel" id="lSort">
        <option value="title">A–Z título</option>
        <option value="artist">A–Z artista</option>
        <option value="bpm">BPM</option>
        <option value="year">Año</option>
        <option value="genre">Género</option>
      </select>
    </div>
    <div id="lList"></div>
  </section>
</main>

<footer>ANA MINI DJ · pide tu canción y suena en la fiesta 🎶</footer>
<div class="toast" id="toast"></div>

const $=id=>document.getElementById(id);
const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
LIB.forEach(t=>{t._s=norm(t.t+' '+t.a);});

/* ---------- tabs ---------- */
function showView(v){
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.toggle('on',x.dataset.v===v));
  document.querySelectorAll('.view').forEach(s=>s.classList.toggle('on',s.id==='v-'+v));
  if(v==='peticiones'){unseen=0;badge.textContent='';badge.style.display='none';
    try{if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}catch(e){}}
  window.scrollTo(0,0);
}
document.querySelectorAll('nav.tabs button').forEach(b=>b.onclick=()=>showView(b.dataset.v));
$('home').onclick=e=>{e.preventDefault();showView('peticiones');};

/* ---------- header stats + share ---------- */
$('stTk').textContent=LIB.length;
if(navigator.share){const sb=$('shareBtn');sb.style.display='block';
  sb.onclick=()=>navigator.share({title:'Ana Mini DJ',text:'¡Pide tu canción a Ana Mini DJ!',url:location.href}).catch(()=>{});}

/* ---------- combobox (solo canciones de la biblioteca) ---------- */
let chosen=null, hl=-1, results=[];
const drop=$('songDrop'), search=$('songSearch');
function renderDrop(){
  if(!results.length){drop.innerHTML='<div class="none">No encuentro esa canción en la biblioteca 🤔</div>';drop.classList.add('on');return;}
  drop.innerHTML=results.map((t,i)=>`<div class="it${i===hl?' hl':''}" data-i="${i}"><span class="t">${esc(t.t)}</span><span class="a">${esc(t.a||'')}</span></div>`).join('');
  drop.classList.add('on');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
search.addEventListener('input',()=>{
  const q=norm(search.value.trim()); hl=-1;
  if(!q){drop.classList.remove('on');results=[];return;}
  results=LIB.filter(t=>t._s.includes(q)).slice(0,40);
  renderDrop();
});
drop.addEventListener('click',e=>{const it=e.target.closest('.it');if(!it)return;pick(results[+it.dataset.i]);});
search.addEventListener('keydown',e=>{
  if(!drop.classList.contains('on'))return;
  if(e.key==='ArrowDown'){hl=Math.min(hl+1,results.length-1);renderDrop();e.preventDefault();}
  else if(e.key==='ArrowUp'){hl=Math.max(hl-1,0);renderDrop();e.preventDefault();}
  else if(e.key==='Enter'){if(hl>=0&&results[hl]){pick(results[hl]);e.preventDefault();}}
  else if(e.key==='Escape')drop.classList.remove('on');
});
document.addEventListener('click',e=>{if(!e.target.closest('.combo'))drop.classList.remove('on');});
function pick(t){chosen=t;$('chT').textContent=t.t;$('chA').textContent=t.a||'';$('songChosen').hidden=false;
  search.value='';drop.classList.remove('on');results=[];validate();}
$('chX').onclick=()=>{chosen=null;$('songChosen').hidden=true;validate();search.focus();};

/* ---------- pedir desde la biblioteca ---------- */
function askFor(t){pick(t);showView('peticiones');$('reqName').focus();
  $('songChosen').scrollIntoView({behavior:'smooth',block:'center'});}

/* ---------- enviar petición ---------- */
const nameI=$('reqName'), msgI=$('reqMsg'), sendB=$('reqSend');
try{const sv=localStorage.getItem('aniadj_name');if(sv)nameI.value=sv;}catch(e){}
function validate(){sendB.disabled=!(chosen && nameI.value.trim().length>=2);}
nameI.addEventListener('input',validate); validate();
sendB.onclick=()=>{
  if(!chosen){toast('Elige una canción de la biblioteca');search.focus();return;}
  if(nameI.value.trim().length<2){toast('Pon tu nombre');nameI.focus();return;}
  const nombre=nameI.value.trim();
  try{localStorage.setItem('aniadj_name',nombre);}catch(e){}
  ref.push({cancion:chosen.t+(chosen.a?(' — '+chosen.a):''),nombre,mensaje:msgI.value.trim(),ts:Date.now(),hecha:false});
  chosen=null;$('songChosen').hidden=true;msgI.value='';validate();
  $('reqOk').style.display='block';toast('✓ ¡Petición enviada!');
  setTimeout(()=>{$('reqOk').style.display='none';},2600);
};
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200);}

/* ---------- biblioteca ---------- */
let lF='all';
$('lFilter').querySelectorAll('button').forEach(b=>b.onclick=()=>{lF=b.dataset.f;
  $('lFilter').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));renderLib();});
$('lSearch').addEventListener('input',()=>{clearTimeout(window._ls);window._ls=setTimeout(renderLib,120);});
$('lSort').addEventListener('change',renderLib);
function renderLib(){
  const q=norm($('lSearch').value.trim());
  let a=LIB.filter(t=>{
    if(lF==='local'&&!t.l)return false;
    if(lF==='missing'&&t.l)return false;
    return !q||t._s.includes(q);
  });
  const s=$('lSort').value;
  a.sort((x,y)=>{
    if(s==='bpm')return (y.b||0)-(x.b||0);
    if(s==='year')return (y.y||0)-(x.y||0);
    if(s==='artist')return norm(x.a).localeCompare(norm(y.a));
    if(s==='genre')return norm(x.g).localeCompare(norm(y.g))||norm(x.t).localeCompare(norm(y.t));
    return norm(x.t).localeCompare(norm(y.t));
  });
  $('lCount').textContent=a.length+' canciones';
  const html=a.slice(0,600).map((t,i)=>`<div class="row">
    <div class="info">
      <div class="ti">${esc(t.t)}</div>
      <div class="ar">${esc(t.a||'—')}</div>
      <div class="pills">${t.g?`<span class="pill g">${esc(t.g)}</span>`:''}${t.b?`<span class="pill">${t.b} BPM</span>`:''}${t.k?`<span class="pill key">${esc(t.k)}</span>`:''}${t.y?`<span class="pill">${t.y}</span>`:''}${t.l?'':'<span class="pill">sin archivo</span>'}</div>
    </div>
    <button class="askbtn" data-i="${LIB.indexOf(t)}" title="Pedir esta canción">🎤</button>
  </div>`).join('');
  $('lList').innerHTML=html||'<div class="empty"><div class="big">Sin resultados</div>Prueba con otra búsqueda.</div>';
  if(a.length>600)$('lList').insertAdjacentHTML('beforeend','<div class="empty" style="padding:20px">Mostrando 600 de '+a.length+'. Afina la búsqueda para ver más.</div>');
}
$('lList').addEventListener('click',e=>{const b=e.target.closest('.askbtn');if(!b)return;const t=LIB[+b.dataset.i];if(t)askFor(t);});
renderLib();
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  const cfg={apiKey:"AIzaSyBpvSiO4rPg48_BpH6qmAu6bgNbDiHHICY",authDomain:"mini-dj-e09fe.firebaseapp.com",databaseURL:"https://mini-dj-e09fe-default-rtdb.europe-west1.firebasedatabase.app",projectId:"mini-dj-e09fe",storageBucket:"mini-dj-e09fe.firebasestorage.app",messagingSenderId:"759806179530",appId:"1:759806179530:web:8d4e381b0181675b2b1c33"};
  firebase.initializeApp(cfg);
  const ref=firebase.database().ref('peticiones');
  const badge=$('reqBadge'); let unseen=0; let first=true;
  function timeAgo(ts){const d=Math.floor((Date.now()-ts)/1000);if(d<60)return 'justo ahora';if(d<3600)return Math.floor(d/60)+' min';if(d<86400)return Math.floor(d/3600)+' h';return Math.floor(d/86400)+' d';}
  function beep(){try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.001,a.currentTime);g.gain.exponentialRampToValueAtTime(.3,a.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.4);o.start();o.stop(a.currentTime+.42);}catch(e){}}
  let DATA={};
  ref.limitToLast(120).on('value',snap=>{DATA=snap.val()||{};render();});
  ref.limitToLast(1).on('child_added',s=>{ if(first)return;
    const v=s.val(); const onTab=document.querySelector('.view#v-peticiones').classList.contains('on');
    if($('reqSound').checked)beep();
    if(!onTab){unseen++;badge.textContent=unseen;badge.style.display='inline-block';}
    if('Notification'in window&&Notification.permission==='granted')try{new Notification('🎤 Nueva petición',{body:(v.nombre||'Anónimo')+': '+v.cancion});}catch(e){}
  });
  setTimeout(()=>{first=false;},1500);
  function render(){
    const arr=Object.entries(DATA).map(([k,v])=>({k,...v})).sort((a,b)=>b.ts-a.ts);
    const pend=arr.filter(r=>!r.hecha).length;
    $('reqCount').textContent=pend+' pendientes';
    $('reqList').innerHTML=arr.length?arr.map(r=>`<div class="req${r.hecha?' done':''}">
       <div class="body">
         <div class="song">${esc(r.cancion||'')}</div>
         <div class="who">${esc(r.nombre||'Anónimo')}</div>
         ${r.mensaje?`<div class="msg">“${esc(r.mensaje)}”</div>`:''}
         <div class="when">${timeAgo(r.ts)}</div>
       </div>
       <button class="mark" data-k="${r.k}" title="Marcar atendida">✓</button>
     </div>`).join(''):'<div class="empty"><div class="big">Aún no hay peticiones</div>¡Sé la primera persona en pedir una canción!</div>';
  }
  $('reqList').addEventListener('click',e=>{const b=e.target.closest('.mark');if(!b)return;const r=DATA[b.dataset.k];if(r)ref.child(b.dataset.k).update({hecha:!r.hecha});});
  $('reqClear').onclick=()=>{if(!confirm('¿Borrar las peticiones ya atendidas?'))return;Object.entries(DATA).forEach(([k,v])=>{if(v.hecha)ref.child(k).remove();});};
</script>
